<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body>
    <h1>Welcome to Pet Adoption!</h1>

    <form action="/signup-process" method="post">
        <!-- Username -->
        <label for="username">Username:</label>
        <input type="text" name="username" required>

        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        &nbsp;<input type="password" id="password" name="password" required>

        <br><br>

        <label for="cfmPassword">Confirm Password:</label>
        <input type="password" name="cfmPassword" required>

        <br><br>

        <button type="submit">Sign Up</button>

        <br><br>

        <em><p>If you're an existing user, <a href="/login.html"> login </a>here instead!</p></em>
    </form>
</body>

</html>
