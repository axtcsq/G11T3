<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="icon" type="image/x-icon" href="./img/paw.png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS to beautify page design -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("./img/team-bg.png");
            background-size: cover;
            background-position: center;
            color: #fff;
        }

        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 40px 30px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.9rem;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,152,0,0.4);
        }

        .secondary {
            background: rgba(255,255,255,0.15);
        }

        .secondary:hover {
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🐾 Pet Adoption</h1>
        <p class="subtitle">Welcome! To get started, i'm a:</p>

        <a href="/login">
            <button class="btn">Existing User (Login)</button>
        </a>

        <a href="/signup">
            <button class="btn secondary">New User (Sign Up)</button>
        </a>
    </div>
</body>
</html>
